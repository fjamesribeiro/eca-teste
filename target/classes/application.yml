spring:
  application:
    name: gestao-obras-ace

  datasource:
    url: jdbc:postgresql://localhost:5432/gestao_obras
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:https://cognito-idp.us-east-1.amazonaws.com/us-east-1_EXAMPLE}

# Configurações do módulo ACE
ace:
  session:
    timeout-minutes: 480
    max-simultaneous: 2
  activation:
    link-hours: 72
  login:
    max-attempts: 5
    lockout-minutes: 30
  password:
    expiration-days: 90
    history-count: 5
  email:
    remetente: ${ACE_EMAIL_REMETENTE:noreply@cdhu.sp.gov.br}
    base-url: ${ACE_EMAIL_BASE_URL:http://localhost:3000}
